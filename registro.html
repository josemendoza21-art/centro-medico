<!DOCTYPE html>
<html>
<head>
<title>Registro de Usuario</title>
</head>
<body>
<header>
    <h1>Formulario de Registro</h1>
</header>
<form action="./contenido_pagina/pagina_principal.html" method="get" >
<fieldset>
    <legend>Registre sus datos para obtener su cuenta : </legend>
<label for="nombre">Nombre:</label><br>
<input type="text" id="nombre" name="nombre" required><br><br>

<label for="DNI">DNI</label><br>
 <input type="text" name="DNI" id="DNI" placeholder="Ingrese su Documento" pattern="[0-9]{8}" required><br><br>

<label for="correo">Correo electrónico:</label><br>
<input type="email" id="correo" name="correo" required><br><br>

<label for="password">Contraseña:</label><br>
<input type="password" id="password" name="password" pattern=".{6,12}" required><br><br>

<label for="veripassword">Verificar Contraseña:</label><br>
<input type="password" id="veripassword" name="veripassword" pattern=".{6,12}" required><br><br>

<label for="foto">Foto de Perfil:</label><br>
<input type="file" id="foto" name="foto" accept="image/*" required><br><br>

<img src="img/image.png" alt="Ejemplo foto de perfil" width="120">
<br><br>
<button type="submit">Enviar</button>
<button type="reset">Reiniciar</button>
</fieldset>
</form>
<footer>
    <div>
        <img src="img/centro de salud.jpg" width="300" height="240">
        <img src="img/centro de salud1.jpg" width="300" height="240">
    </div>
</footer>

</body>
</html>
